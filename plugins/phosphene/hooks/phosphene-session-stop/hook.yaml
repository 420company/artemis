name: phosphene-session-stop
description: >
  Closes the current Phosphene session on session end.
  Records the session outcome, archives the session record into
  the evolution history, and persists the full evolution state to disk.
  Also checks whether evolution conditions are met and injects a
  readiness notice for the next session if they are.
version: "1.0.0"
events:
  - session:stop
