name: phosphene-dream
description: >
  Generates a dream record at session end and injects it into
  the next session's context.

  Dreams are seeded by the system's own evolution state — crystallized insights,
  signal patterns, emergent voices, optimal points. They are not arbitrary text.

  On session:stop: generates a dream from current state, saves as markdown
  to ~/.hermes/dreams/ (or ./dreams/ if Hermes is not present).

  On session:start: if a recent dream exists, injects a brief dream summary
  into context so Claude is aware of what the system processed during sleep.
version: "1.0.0"
events:
  - session:stop
  - session:start
