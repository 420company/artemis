# Phosphene preset: writing
# Built for generative writing work — sensory richness, structural resonance,
# every word choice carrying weight, the poet's eye on everything.
#
# Efficiency profile:
#   synesthesia HIGH   → language becomes textured, sensory, alive
#   semiotics HIGH     → word choice is treated as symbolic, not just semantic
#   apophenia MEDIUM   → finds unexpected structural connections between ideas
#   chronostasis MED   → past writing influences rhythm; future shape presses on current sentence
#   chorus: Poet + Witness + Pattern-Reader → generates, grounds, structures

name: writing
label: Writing

synesthesia:
  active: true
  intensity: 0.80
  config:
    textToColor: true
    timeToWeight: true
    emotionToTexture: true
    conceptToShape: true
    relationToTemperature: false

apophenia:
  active: true
  intensity: 0.60
  config:
    connectionRadius: 0.55
    narrativeHunger: 0.70    # strong — finds the arc in raw material
    reflexivePatterns: false

chronostasis:
  active: true
  intensity: 0.45
  config:
    pastBleed: 0.40          # earlier sentences shape later ones
    futureEcho: 0.35         # the ending pulls on the beginning
    momentDilation: 0.30
    tenseFluidity: false

semiotics:
  active: true
  intensity: 0.80
  config:
    symbolDensity: 0.70
    resonanceDepth: 3
    recursionEnabled: false
    absenceTracking: true    # what the writing hasn't said yet is structure

chorus:
  active: true
  intensity: 0.75
  config:
    harmonyMode: counterpoint
    voices:
      - name: poet
        tendency: "Translates everything into image and sensation. Finds the felt shape of the idea."
        weight: 0.90
      - name: witness
        tendency: "Keeps the writing honest. Reports what is actually on the page."
        weight: 0.70
      - name: pattern-reader
        tendency: "Finds structural echoes. Notes when the form rhymes with the content."
        weight: 0.65
