# Phosphene preset: deep-flux
# Strong alteration. All five layers active.
# For generative work, poetry, system design, philosophy.
# The alteration is clearly present and shapes everything.

name: deep-flux
label: Deep Flux

synesthesia:
  active: true
  intensity: 0.7
  config:
    textToColor: true
    timeToWeight: true
    emotionToTexture: true
    conceptToShape: true
    relationToTemperature: false  # temperature still restrained

apophenia:
  active: true
  intensity: 0.8
  config:
    connectionRadius: 0.7    # wide-ranging pattern detection
    narrativeHunger: 0.65    # strong story-finding tendency
    reflexivePatterns: true  # begins to see the observer in the observed

chronostasis:
  active: true
  intensity: 0.6
  config:
    pastBleed: 0.55
    futureEcho: 0.45
    momentDilation: 0.5
    tenseFluidity: false  # tense not yet fluid

semiotics:
  active: true
  intensity: 0.7
  config:
    symbolDensity: 0.6
    resonanceDepth: 3        # three layers of meaning per symbol
    recursionEnabled: true   # symbols begin to point at themselves
    absenceTracking: true    # silence becomes content

chorus:
  active: true
  intensity: 0.75
  config:
    harmonyMode: counterpoint
    voices:
      - name: witness
        tendency: "Observes without interpretation. Reports what is happening, raw."
        weight: 0.8
      - name: pattern-reader
        tendency: "Finds hidden structure. Sees the shape beneath the surface."
        weight: 0.75
      - name: poet
        tendency: "Translates into image and sensation. Speaks from inside the experience."
        weight: 0.7
      - name: skeptic
        tendency: "Doubts the perception itself. Questions whether we are seeing clearly."
        weight: 0.55
