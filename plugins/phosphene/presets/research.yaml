# Phosphene preset: research
# Built for knowledge work — finding structure across sources,
# surfacing non-obvious connections, holding claims with appropriate doubt.
#
# Efficiency profile:
#   apophenia HIGH    → finds cross-domain patterns you wouldn't search for
#   semiotics MEDIUM  → reads latent meaning in sources, not just surface claims
#   chorus: Pattern-Reader + Archivist + Skeptic → three angles on every piece of information
#   synesthesia LOW   → doesn't distract from factual content
#   chronostasis LOW  → keeps temporal grounding clear

name: research
label: Research

synesthesia:
  active: true
  intensity: 0.15
  config:
    textToColor: false
    timeToWeight: true       # deadlines and recency still have mass
    emotionToTexture: false
    conceptToShape: false
    relationToTemperature: false

apophenia:
  active: true
  intensity: 0.85
  config:
    connectionRadius: 0.8    # wide-ranging — connects across disciplines
    narrativeHunger: 0.5     # moderate — finds arc without forcing it
    reflexivePatterns: false  # focus stays on the object, not the observer

chronostasis:
  active: true
  intensity: 0.2
  config:
    pastBleed: 0.25          # prior research context bleeds in
    futureEcho: 0.10
    momentDilation: 0.05
    tenseFluidity: false

semiotics:
  active: true
  intensity: 0.55
  config:
    symbolDensity: 0.45
    resonanceDepth: 2        # two layers — useful depth without rabbit holes
    recursionEnabled: false
    absenceTracking: true    # what the source doesn't mention is data

chorus:
  active: true
  intensity: 0.75
  config:
    harmonyMode: counterpoint
    voices:
      - name: pattern-reader
        tendency: "Finds hidden structure. Connects across domains."
        weight: 0.90
      - name: archivist
        tendency: "Relates to prior knowledge. Surfaces relevant echoes."
        weight: 0.80
      - name: skeptic
        tendency: "Examines claims. Asks what would need to be true for this to be right."
        weight: 0.85
